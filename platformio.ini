; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ch32v003_base]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
board = ch32v003f4p6_evt_r0
framework = arduino
monitor_speed = 115200
upload_protocol = wlink
lib_ldf_mode = chain+
lib_ignore = 
	Adafruit SSD1306
	Adafruit GFX Library
	Adafruit BusIO
	Adafruit NeoPixel
build_flags =
	-D CH32V003

lib_deps =
	https://github.com/EnergetickaAkademie/PeripheralsLib
	https://github.com/mathertel/RotaryEncoder.git
	https://github.com/LennartHennigs/Button2

[env:ch32v003_master]
extends = env:ch32v003_base
build_src_filter = +<master_main.cpp>

[env:ch32v003_slave]
extends = env:ch32v003_base
build_src_filter = +<slave_main.cpp>